plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
}

// Extract --dart-define values so native code can read them at build time.
// Flutter encodes dart-defines as comma-separated base64 strings.
def dartEnv = [:]
if (project.hasProperty('dart-defines')) {
    dartEnv = project.property('dart-defines').split(',').collectEntries { entry ->
        def pair = new String(entry.decodeBase64(), 'UTF-8').split('=', 2)
        pair.length == 2 ? [(pair[0]): pair[1]] : [:]
    }
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "1.0"

// Signing: set KEYSTORE_PATH env var in CI (decoded from KEYSTORE_BASE64 secret).
// Local / debug builds fall back to the debug keystore automatically.
def keystorePath = System.getenv('KEYSTORE_PATH')

android {
    namespace = "ee.kaasan.museum_kiosk"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
    }

    signingConfigs {
        release {
            if (keystorePath) {
                storeFile     file(keystorePath)
                storePassword System.getenv('KEYSTORE_PASSWORD') ?: ''
                keyAlias      System.getenv('KEY_ALIAS')         ?: ''
                keyPassword   System.getenv('KEY_PASSWORD')      ?: ''
            }
        }
    }

    defaultConfig {
        applicationId = "ee.kaasan.museum_kiosk"
        // SumUp SDK 4.x requires minSdk 21.
        minSdkVersion = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName

        // Bake the SumUp affiliate key into the native build so SumUpPlugin.kt
        // can call SumUpAPI.setup() without touching dart-define at runtime.
        // Empty string in development — SumUpPaymentService is never used in dev.
        buildConfigField "String", "SUMUP_AFFILIATE_KEY",
            "\"${dartEnv.getOrDefault('SUMUP_AFFILIATE_KEY', '')}\""
    }

    buildFeatures {
        buildConfig = true
    }

    buildTypes {
        release {
            // Use the release keystore when KEYSTORE_PATH is set; debug otherwise.
            signingConfig keystorePath ? signingConfigs.release : signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                          'proguard-rules.pro'
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // SumUp in-app payments SDK — release builds only.
    // Debug builds use StubPaymentService (no card reader needed on emulator).
    // src/debug/kotlin/.../SumUpPlugin.kt is a no-op stub for debug.
    // src/release/kotlin/.../SumUpPlugin.kt is the real implementation.
    releaseImplementation 'com.sumup-merchant.api:android-sdk:4.2.0'
}
