plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

// Extract --dart-define values so native code can read them at build time.
// Flutter encodes dart-defines as comma-separated base64 strings.
def dartEnv = [:]
if (project.hasProperty('dart-defines')) {
    dartEnv = project.property('dart-defines').split(',').collectEntries { entry ->
        def pair = new String(entry.decodeBase64(), 'UTF-8').split('=', 2)
        pair.length == 2 ? [(pair[0]): pair[1]] : [:]
    }
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "1.0"

android {
    namespace = "ee.kaasan.museum_kiosk"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        applicationId = "ee.kaasan.museum_kiosk"
        // SumUp SDK 4.x requires minSdk 21.
        minSdk = 21
        targetSdk = flutter.targetSdkVersion
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName

        // Bake the SumUp affiliate key into the native build so SumUpPlugin.kt
        // can call SumUpAPI.setup() without touching dart-define at runtime.
        // Empty string in development — SumUpPaymentService is never used in dev.
        buildConfigField "String", "SUMUP_AFFILIATE_KEY",
            "\"${dartEnv.getOrDefault('SUMUP_AFFILIATE_KEY', '')}\""
    }

    buildFeatures {
        buildConfig = true
    }

    buildTypes {
        release {
            // TODO: Replace with production signing config before shipping.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // SumUp in-app payments SDK.
    // Repository declared in android/build.gradle (maven.sumup.com).
    implementation 'com.sumup-merchant.api:android-sdk:4.2.0'
}
