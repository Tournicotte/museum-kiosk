name: CI

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify code generation is up to date
        run: |
          dart run build_runner build --delete-conflicting-outputs
          git diff --exit-code lib/ test/ || \
            (echo "Generated files are out of date — run build_runner locally" && exit 1)

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --coverage
